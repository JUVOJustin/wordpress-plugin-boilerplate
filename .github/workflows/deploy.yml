name: Deploy

on:
  push:
    tags:
      - '*'

jobs:
  setup:
    if: github.repository != 'JUVOJustin/wordpress-plugin-boilerplate'
    uses: ./.github/workflows/setup.yml
    with:
      mode: 'prod'

  deploy:
    if: github.repository != 'JUVOJustin/wordpress-plugin-boilerplate'
    runs-on: ubuntu-latest
    needs: setup

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          # Full history keeps the tag checkout consistent with release metadata.
          fetch-depth: 0

      - name: PHP dependencies cache
        uses: actions/cache@v5
        with:
          path: |
            vendor
            vendor-prefixed
          key: ${{ needs.setup.outputs.php-cache-key }}
          fail-on-cache-miss: true

      - name: Node dependencies cache
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            build
          key: ${{ needs.setup.outputs.node-cache-key }}
          fail-on-cache-miss: true

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: wp-cli

      - name: Install latest version of dist-archive-command
        run: wp package install wp-cli/dist-archive-command:v3.1.0

      - name: Set env
        run: |
          RELEASE_VERSION="${GITHUB_REF#refs/*/}"
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV
          if [[ "$RELEASE_VERSION" =~ -(alpha|beta|rc) ]]; then
            echo "IS_PRERELEASE=true" >> $GITHUB_ENV
            echo "MAKE_LATEST=false" >> $GITHUB_ENV
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_ENV
            echo "MAKE_LATEST=true" >> $GITHUB_ENV
          fi

      - name: Update Version in WordPress files
        run: |
          sed -i -E "s/(const PLUGIN_VERSION = ')[^']*(';)/\1${{ env.RELEASE_VERSION }}\2/" src/Demo_Plugin.php
          sed -i -E 's/([[:blank:]]*\*[[:blank:]]*Version:[[:blank:]]*).*/\1${{ env.RELEASE_VERSION }}/' demo-plugin.php
          sed -i -E 's/Stable tag: .*/Stable tag: ${{ env.RELEASE_VERSION }}/' README.txt

      # Cache the wp-env Docker images between runs. wp-env has no native cache
      # hook, so we cache at the Docker daemon level via save/load. The post-step
      # of actions/cache only uploads on a miss, so the "Save" step below
      # populates the directory whenever the cache was not hit.
      - name: Cache wp-env Docker images
        id: wp-env-docker-cache
        uses: actions/cache@v5
        with:
          path: ~/.wp-env-docker-cache
          key: wp-env-docker-${{ runner.os }}-${{ hashFiles('.wp-env.json', 'package-lock.json') }}

      - name: Load cached wp-env Docker images
        if: steps.wp-env-docker-cache.outputs.cache-hit == 'true'
        run: |
          for img in ~/.wp-env-docker-cache/*.tar; do
            [ -e "$img" ] || continue
            docker load -i "$img"
          done

      - name: Start wp-env
        run: npm run env:start

      - name: Save wp-env Docker images for next run
        if: steps.wp-env-docker-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.wp-env-docker-cache
          docker images --format '{{.Repository}}:{{.Tag}}' \
            | grep -iE 'wordpress|mariadb|mysql|wp-env|cli' \
            | while read -r image; do
                safe=$(echo "$image" | tr '/:' '__')
                docker save "$image" -o ~/.wp-env-docker-cache/"$safe".tar
              done

      - name: Compile translations in wp-env from po files
        run: npm run env:cli composer run i18n:compile

      - name: Build dist-archive on host
        run: |
          wp dist-archive . ./demo-plugin-${{ env.RELEASE_VERSION }}.zip --plugin-dirname=demo-plugin
          mkdir tmp-build
          unzip demo-plugin-${{ env.RELEASE_VERSION }}.zip -d tmp-build

      - name: Stop wp-env
        if: always()
        run: npm run env:stop

      - name: Persist stable version to default branch
        if: env.IS_PRERELEASE == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/Demo_Plugin.php demo-plugin.php README.txt
          if git diff --cached --quiet; then
            echo "No changes to commit; skipping commit and push."
          else
            git commit -m "Update version to ${{ env.RELEASE_VERSION }}"
            git push origin HEAD:refs/heads/${{ github.event.repository.default_branch }}
          fi

      - name: Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          omitBodyDuringUpdate: true
          artifacts: "./demo-plugin-${{ env.RELEASE_VERSION }}.zip"
          prerelease: ${{ env.IS_PRERELEASE }}
          makeLatest: ${{ env.MAKE_LATEST }}
