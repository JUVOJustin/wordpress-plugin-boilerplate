name: Deploy

on:
  push:
    tags:
      - '*'

jobs:
  setup:
    if: github.repository != 'JUVOJustin/wordpress-plugin-boilerplate'
    uses: ./.github/workflows/setup.yml
    with:
      mode: 'prod'

  deploy:
    if: github.repository != 'JUVOJustin/wordpress-plugin-boilerplate'
    runs-on: ubuntu-latest
    needs: setup

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          # Full history keeps the tag checkout consistent with release metadata.
          fetch-depth: 0

      - name: PHP dependencies cache
        uses: actions/cache@v5
        with:
          path: |
            vendor
            vendor-prefixed
          key: ${{ needs.setup.outputs.php-cache-key }}
          fail-on-cache-miss: true

      - name: Node dependencies cache
        uses: actions/cache@v5
        with:
          path: |
            node_modules
            build
          key: ${{ needs.setup.outputs.node-cache-key }}
          fail-on-cache-miss: true

      - name: Set env
        run: |
          RELEASE_VERSION="${GITHUB_REF#refs/*/}"
          echo "RELEASE_VERSION=$RELEASE_VERSION" >> $GITHUB_ENV
          if [[ "$RELEASE_VERSION" =~ -(alpha|beta|rc) ]]; then
            echo "IS_PRERELEASE=true" >> $GITHUB_ENV
            echo "MAKE_LATEST=false" >> $GITHUB_ENV
          else
            echo "IS_PRERELEASE=false" >> $GITHUB_ENV
            echo "MAKE_LATEST=true" >> $GITHUB_ENV
          fi

      - name: Update Version in WordPress files
        run: |
          sed -i -E "s/(const PLUGIN_VERSION = ')[^']*(';)/\1${{ env.RELEASE_VERSION }}\2/" src/Demo_Plugin.php
          sed -i -E 's/([[:blank:]]*\*[[:blank:]]*Version:[[:blank:]]*).*/\1${{ env.RELEASE_VERSION }}/' demo-plugin.php
          sed -i -E 's/Stable tag: .*/Stable tag: ${{ env.RELEASE_VERSION }}/' README.txt

      - name: Start wp-env
        run: npm run env:start

      - name: Download latest WP-CLI in wp-env
        run: |
          npm run env:cli -- bash -lc 'curl -fL -o /tmp/wp-cli-nightly.phar https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli-nightly.phar'
          npm run env:cli -- php /tmp/wp-cli-nightly.phar cli version

      - name: Install dist-archive-command in wp-env
        run: npm run env:cli -- php -d memory_limit=-1 /tmp/wp-cli-nightly.phar package install wp-cli/dist-archive-command:@stable

      - name: Compile translations in wp-env from po files
        run: npm run env:cli composer run i18n:compile

      - name: Build dist-archive in wp-env
        run: |
          npm run env:cli -- php -d memory_limit=-1 /tmp/wp-cli-nightly.phar dist-archive . ./demo-plugin-${{ env.RELEASE_VERSION }}.zip --plugin-dirname=demo-plugin
          mkdir tmp-build
          unzip demo-plugin-${{ env.RELEASE_VERSION }}.zip -d tmp-build

      - name: Stop wp-env
        if: always()
        run: npm run env:stop

      - name: Persist stable version to default branch
        if: env.IS_PRERELEASE == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/Demo_Plugin.php demo-plugin.php README.txt
          if git diff --cached --quiet; then
            echo "No changes to commit; skipping commit and push."
          else
            git commit -m "Update version to ${{ env.RELEASE_VERSION }}"
            git push origin HEAD:refs/heads/${{ github.event.repository.default_branch }}
          fi

      - name: Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          omitBodyDuringUpdate: true
          artifacts: "./demo-plugin-${{ env.RELEASE_VERSION }}.zip"
          prerelease: ${{ env.IS_PRERELEASE }}
          makeLatest: ${{ env.MAKE_LATEST }}
