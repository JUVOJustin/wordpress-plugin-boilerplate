name: Test/Analyse

on:
  push:
    branches:
      - '**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    uses: ./.github/workflows/setup.yml
    with:
      mode: 'dev'

  test-js:
    runs-on: ubuntu-latest
    needs: setup
    
    steps:
      - uses: actions/checkout@v6

      - name: Restore Node dependencies cache
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            build
          key: ${{ needs.setup.outputs.node-cache-key }}
          fail-on-cache-miss: true

      - name: Lint JS
        run: npm run lint:js

      - name: Lint Style
        run: npm run lint:style

      - name: Build assets
        run: npm run build

  test-php:
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - uses: actions/checkout@v6

      - name: Restore PHP dependencies cache
        uses: actions/cache/restore@v5
        with:
          path: |
            vendor
            vendor-prefixed
          key: ${{ needs.setup.outputs.php-cache-key }}
          fail-on-cache-miss: true

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          tools: cs2pr

      - name: PHPSTAN
        run: composer run phpstan:ci

      - name: PHPCS
        id: phpcs
        continue-on-error: true
        run: composer run phpcs:ci

      - name: Show PHPCS results in PR
        if: ${{ always() && steps.phpcs.outcome == 'failure' }}
        run: cs2pr ./phpcs-report.xml --graceful-warnings

  test-application:
    runs-on: ubuntu-latest
    needs: [setup, test-php, test-js]

    steps:
      - uses: actions/checkout@v6

      - name: Restore PHP dependencies cache
        uses: actions/cache/restore@v5
        with:
          path: |
            vendor
            vendor-prefixed
          key: ${{ needs.setup.outputs.php-cache-key }}
          fail-on-cache-miss: true

      - name: Restore Node dependencies cache
        uses: actions/cache/restore@v5
        with:
          path: |
            node_modules
            build
          key: ${{ needs.setup.outputs.node-cache-key }}
          fail-on-cache-miss: true

      - name: Write Composer auth for test dependencies
        if: env.COMPOSER_AUTH != ''
        env:
          COMPOSER_AUTH: ${{ secrets.COMPOSER_AUTH }}
        run: |
          cat << 'EOF' > tests/auth.json
          $COMPOSER_AUTH
          EOF

      # Cache the wp-env Docker images between runs. wp-env has no native cache
      # hook, so we cache at the Docker daemon level via save/load. The post-step
      # of actions/cache only uploads on a miss, so the "Save" step below
      # populates the directory whenever the cache was not hit.
      - name: Cache wp-env Docker images
        id: wp-env-docker-cache
        uses: actions/cache@v5
        with:
          path: ~/.wp-env-docker-cache
          key: wp-env-docker-${{ runner.os }}-${{ hashFiles('.wp-env.json', 'package-lock.json') }}

      - name: Load cached wp-env Docker images
        if: steps.wp-env-docker-cache.outputs.cache-hit == 'true'
        run: |
          for img in ~/.wp-env-docker-cache/*.tar; do
            [ -e "$img" ] || continue
            docker load -i "$img"
          done

      - name: Start wp-env
        run: npm run env:start

      - name: Save wp-env Docker images for next run
        if: steps.wp-env-docker-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.wp-env-docker-cache
          docker images --format '{{.Repository}}:{{.Tag}}' \
            | grep -iE 'wordpress|mariadb|mysql|wp-env|cli' \
            | while read -r image; do
                safe=$(echo "$image" | tr '/:' '__')
                docker save "$image" -o ~/.wp-env-docker-cache/"$safe".tar
              done

      - name: Run application tests
        run: npm run test:php